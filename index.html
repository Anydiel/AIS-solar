<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Anydiel IT Services · Accurate Solar Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #eef2f5;
            color: #1a2a3a;
            padding: 0.75rem;
            transition: background 0.3s;
        }
        body.dark-mode { background: #0f172a; color: #e2e8f0; }
        body.dark-mode .card { background: #1e293b; }
        body.dark-mode .spec-card { background: #0f172a; }
        body.dark-mode .step-card { background: #1e293b; }
        body.dark-mode .diagram { background: #0f172a; }
        body.dark-mode .image-hero { background: #1e293b; border-color: #475569; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        .hero-main { text-align: center; margin-bottom: 1rem; }
        .hero-main h1 { font-size: 1.5rem; background: linear-gradient(135deg, #0059b3, #0088cc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .card { background: white; border-radius: 1.25rem; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .grid-2col { display: flex; flex-direction: column; gap: 1rem; }
        @media (min-width: 768px) { .grid-2col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; } }
        
        label { font-weight: 600; margin-top: 0.5rem; display: block; font-size: 0.8rem; }
        input, select { width: 100%; padding: 0.6rem; border-radius: 1rem; border: 1px solid #ccc; margin-top: 0.2rem; font-size: 0.9rem; }
        .btn-calc { background: #0059b3; color: white; border: none; width: 100%; padding: 0.7rem; font-weight: bold; border-radius: 1.5rem; margin-top: 0.8rem; cursor: pointer; }
        .spec-card { background: #f1f5f9; border-radius: 1rem; padding: 0.7rem; margin-top: 1rem; }
        .spec-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #ddd; font-size: 0.75rem; flex-wrap: wrap; gap: 0.3rem; }
        .value { font-weight: 700; color: #1e6f3f; text-align: right; }
        .warning-value { color: #dc2626; font-weight: 700; }
        
        .step-card { background: white; border-radius: 1rem; margin-bottom: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0; }
        .step-header { background: #0059b3; color: white; padding: 0.7rem; font-weight: bold; font-size: 0.9rem; }
        .step-content { padding: 0.8rem; }
        .diagram { background: #1e2a3a; border-radius: 0.8rem; padding: 0.8rem; margin: 0.6rem 0; text-align: center; overflow-x: auto; }
        
        .image-hero {
            background: #f1f5f9;
            border: 2px dashed #0059b3;
            border-radius: 0.8rem;
            padding: 0.8rem;
            margin: 0.8rem 0;
            text-align: center;
            transition: all 0.2s;
        }
        .image-hero img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            display: block;
            margin: 0 auto;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            margin: 0.8rem 0;
            border-radius: 0.8rem;
            background: #000;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .warning-box { background: #fee2e2; border-left: 4px solid #dc2626; padding: 0.5rem; border-radius: 0.8rem; margin: 0.6rem 0; font-size: 0.75rem; }
        .success-box { background: #dcfce7; border-left: 4px solid #16a34a; padding: 0.5rem; border-radius: 0.8rem; margin: 0.6rem 0; font-size: 0.75rem; }
        .info-box { background: #e0f2fe; border-left: 4px solid #0284c7; padding: 0.5rem; border-radius: 0.8rem; margin: 0.6rem 0; font-size: 0.75rem; }
        
        footer { text-align: center; font-size: 0.6rem; margin-top: 1rem; }
        @media (max-width: 480px) { .spec-row { flex-direction: column; } .value { text-align: left; margin-top: 0.2rem; } }
        
        .chat-messages { background: #f8fafc; border-radius: 1rem; height: 180px; overflow-y: auto; padding: 0.5rem; margin: 0.5rem 0; }
        .message { margin-bottom: 0.4rem; padding: 0.4rem; border-radius: 1rem; font-size: 0.75rem; max-width: 90%; }
        .user-msg { background: #0059b3; color: white; margin-left: auto; text-align: right; }
        .ai-msg { background: #e9ecef; color: #1e2a3a; }
        .chat-input-area { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .chat-input { flex: 1; padding: 0.5rem; border-radius: 1.5rem; border: 1px solid #ccc; font-size: 0.8rem; }
        .btn-send { background: #1e6f3f; color: white; border: none; padding: 0.5rem 1rem; border-radius: 1.5rem; cursor: pointer; }
        .api-config { background: #f0f4f8; border-radius: 1rem; padding: 0.7rem; margin-bottom: 0.5rem; }
        .api-input { width: 100%; padding: 0.5rem; border-radius: 1rem; border: 1px solid #ccc; margin-bottom: 0.3rem; }
        .btn-api { background: #e67e22; color: white; border: none; padding: 0.4rem; border-radius: 1rem; width: 100%; cursor: pointer; }
        .status-ok { color: #16a34a; font-size: 0.65rem; }
        .status-error { color: #dc2626; font-size: 0.65rem; }
        .btn-dark { position: fixed; bottom: 15px; right: 15px; background: #1e293b; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .checklist-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.5rem; }
        .checklist-item { display: flex; align-items: center; gap: 0.75rem; font-size: 0.8rem; padding: 0.5rem; background: #f8fafc; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; }
        body.dark-mode .checklist-item { background: #1e293b; }
        .checklist-item:hover { background: #e2e8f0; transform: translateX(4px); }
        body.dark-mode .checklist-item:hover { background: #334155; }
        .checklist-item input[type="checkbox"] { width: 1.2rem; height: 1.2rem; min-width: 1.2rem; cursor: pointer; accent-color: #1e6f3f; margin: 0; }
        .checklist-item span { flex: 1; line-height: 1.3; }
        .checklist-item input:checked + span { text-decoration: line-through; opacity: 0.7; }
        
        button, .btn-calc, .btn-send, .btn-api, .btn-dark, .checklist-item { touch-action: manipulation; }
        button:active, .btn-calc:active { transform: scale(0.97); }
        .image-hero img { max-width: 100%; }
        @media (max-width: 640px) { .image-hero { padding: 0.5rem; } }
        .scroll-hint { text-align: center; font-size: 0.65rem; color: #6c757d; margin: 0.5rem 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-main">
        <h1>⚡ Anydiel IT Services</h1>
        <p style="font-size:0.75rem;">Accurate Solar System Calculator · Based on 630W Panels</p>
    </div>

    <div class="grid-2col">
        <div class="card">
            <h3 style="font-size:1rem;">📐 System Designer</h3>
            
            <label>⚡ Daily Consumption (Wh/day)</label>
            <input type="number" id="dailyWh" value="5000" step="100">
            
            <label>🔋 System Voltage</label>
            <select id="sysVoltage">
                <option value="12">12V (Small/Caravan)</option>
                <option value="24">24V (Medium System)</option>
                <option value="48" selected>48V (Large System - Recommended)</option>
            </select>
